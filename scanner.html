<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QR Scanner — Event Check-in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-green: #39ff14;
            --neon-purple: #bf5af2;
            --neon-blue: #0a84ff;
            --neon-pink: #ff2d55;
            --neon-orange: #ff9500;
            --bg-dark: #0a0e17;
            --bg-card: rgba(15, 22, 36, 0.75);
            --border: rgba(0, 245, 255, 0.12);
            --border-hover: rgba(0, 245, 255, 0.35);
            --text: #e4eaf5;
            --text-muted: #7a8ba8;
            --gradient-cyber: linear-gradient(135deg, #00f5ff, #0a84ff, #bf5af2);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; background:var(--bg-dark); color:var(--text); min-height:100vh; min-height:100dvh; overflow-x:hidden; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background:var(--neon-cyan); border-radius:10px; }

        /* LOGIN */
        .login-overlay { position:fixed; inset:0; background:var(--bg-dark); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-card { background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:44px 36px; width:90%; max-width:400px; text-align:center; backdrop-filter:blur(20px); position:relative; }
        .login-card::before { content:''; position:absolute; top:-1px; left:20%; right:20%; height:2px; background:var(--gradient-cyber); border-radius:2px; }
        .login-card h2 { font-size:1.5rem; margin-bottom:8px; }
        .login-card p { color:var(--text-muted); font-size:0.9rem; margin-bottom:24px; }
        .login-card input { width:100%; padding:13px 16px; background:rgba(0,245,255,0.03); border:1px solid rgba(0,245,255,0.1); border-radius:var(--radius-sm); color:var(--text); font-size:0.95rem; font-family:'Outfit',sans-serif; outline:none; transition:all 0.3s; margin-bottom:16px; }
        .login-card input:focus { border-color:var(--neon-cyan); box-shadow:0 0 0 3px rgba(0,245,255,0.08); }
        .login-error { color:var(--neon-pink); font-size:0.82rem; margin-bottom:12px; display:none; }
        .btn-primary { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; background:var(--gradient-cyber); color:white; border:none; border-radius:8px; font-size:0.95rem; font-weight:600; font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.3s; width:100%; justify-content:center; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 4px 20px rgba(0,245,255,0.3); }

        /* HEADER */
        .scanner-header { padding:16px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); background:rgba(10,14,23,0.9); backdrop-filter:blur(20px); position:sticky; top:0; z-index:100; }
        .scanner-logo { font-family:'JetBrains Mono',monospace; font-size:1rem; font-weight:700; background:var(--gradient-cyber); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .scanner-logo::before { content:'> '; color:var(--neon-green); -webkit-text-fill-color:var(--neon-green); }
        .header-actions { display:flex; gap:10px; align-items:center; }
        .header-btn { padding:6px 14px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; font-size:0.72rem; cursor:pointer; transition:all 0.3s; text-decoration:none; }
        .header-btn:hover { border-color:var(--neon-cyan); color:var(--text); }
        .logout-btn { border-color:rgba(255,45,85,0.3); color:var(--neon-pink); }
        .logout-btn:hover { background:rgba(255,45,85,0.1); border-color:var(--neon-pink); }

        /* STATS BAR */
        .stats-bar { display:flex; gap:12px; padding:16px 5%; flex-wrap:wrap; }
        .stat-pill { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:12px 20px; flex:1; min-width:100px; text-align:center; backdrop-filter:blur(12px); }
        .stat-pill .num { font-family:'JetBrains Mono',monospace; font-size:1.8rem; font-weight:700; display:block; }
        .stat-pill .label { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
        .stat-attended .num { color:var(--neon-green); }
        .stat-approved .num { color:var(--neon-cyan); }
        .stat-remaining .num { color:var(--neon-orange); }

        /* SCANNER CONTAINER */
        .scanner-section { padding:16px 5%; max-width:550px; margin:0 auto; }
        .scanner-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; position:relative; }
        .scanner-card::before { content:''; position:absolute; top:-1px; left:20%; right:20%; height:2px; background:var(--gradient-cyber); border-radius:2px; z-index:1; }
        .scanner-title { padding:16px 20px 8px; text-align:center; }
        .scanner-title h2 { font-size:1.1rem; font-weight:600; }
        .scanner-title p { color:var(--text-muted); font-size:0.82rem; margin-top:4px; }
        #qr-reader { width:100% !important; border:none !important; }
        #qr-reader video { border-radius:0 !important; }
        #qr-reader__scan_region { min-height:280px !important; }
        #qr-reader__dashboard { padding:12px !important; }
        #qr-reader__dashboard button { background:var(--gradient-cyber) !important; color:white !important; border:none !important; border-radius:8px !important; padding:10px 20px !important; font-family:'Outfit',sans-serif !important; font-weight:600 !important; cursor:pointer !important; }
        #qr-reader__dashboard select { background:var(--bg-dark) !important; color:var(--text) !important; border:1px solid var(--border) !important; border-radius:8px !important; padding:8px 12px !important; font-family:'Outfit',sans-serif !important; }
        #qr-reader__dashboard span { color:var(--text-muted) !important; font-family:'Outfit',sans-serif !important; }

        /* RESULT OVERLAY */
        .result-overlay { position:fixed; inset:0; background:rgba(10,14,23,0.92); backdrop-filter:blur(16px); display:none; z-index:200; align-items:center; justify-content:center; }
        .result-overlay.show { display:flex; }
        .result-card { background:var(--bg-card); border-radius:20px; padding:40px 32px; width:90%; max-width:400px; text-align:center; animation:popIn 0.35s ease; position:relative; overflow:hidden; }
        @keyframes popIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
        .result-card.success { border:2px solid rgba(57,255,20,0.4); }
        .result-card.error { border:2px solid rgba(255,45,85,0.4); }
        .result-card.duplicate { border:2px solid rgba(255,149,0,0.4); }
        .result-icon { font-size:3.5rem; margin-bottom:16px; }
        .result-name { font-size:1.4rem; font-weight:700; margin-bottom:4px; }
        .result-role { font-family:'JetBrains Mono',monospace; font-size:0.82rem; padding:4px 14px; border-radius:6px; display:inline-block; margin-bottom:16px; }
        .result-card.success .result-role { background:rgba(57,255,20,0.1); color:var(--neon-green); border:1px solid rgba(57,255,20,0.25); }
        .result-card.error .result-role { background:rgba(255,45,85,0.1); color:var(--neon-pink); border:1px solid rgba(255,45,85,0.25); }
        .result-card.duplicate .result-role { background:rgba(255,149,0,0.1); color:var(--neon-orange); border:1px solid rgba(255,149,0,0.25); }
        .result-msg { color:var(--text-muted); font-size:0.9rem; margin-bottom:24px; }
        .result-dismiss { padding:10px 28px; background:rgba(0,245,255,0.06); border:1px solid var(--border); border-radius:8px; color:var(--neon-cyan); font-family:'JetBrains Mono',monospace; font-size:0.82rem; cursor:pointer; transition:all 0.3s; }
        .result-dismiss:hover { background:rgba(0,245,255,0.12); border-color:var(--neon-cyan); }

        /* RECENT CHECKINS */
        .recent-section { padding:16px 5%; max-width:550px; margin:0 auto; }
        .recent-section h3 { font-size:0.95rem; margin-bottom:12px; color:var(--text-muted); }
        .recent-list { list-style:none; }
        .recent-item { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; animation:slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
        .recent-item .ri-name { font-weight:600; font-size:0.92rem; }
        .recent-item .ri-role { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--neon-cyan); background:rgba(0,245,255,0.08); padding:3px 10px; border-radius:5px; }
        .recent-item .ri-time { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-muted); }
        .empty-recent { text-align:center; padding:32px; color:var(--text-muted); font-size:0.88rem; }

        /* TOAST */
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:14px 24px; border-radius:12px; font-size:0.88rem; z-index:10000; display:none; backdrop-filter:blur(20px); max-width:90%; text-align:center; }
        .toast-success { background:rgba(57,255,20,0.15); border:1px solid rgba(57,255,20,0.3); color:var(--neon-green); }
        .toast-error { background:rgba(255,45,85,0.15); border:1px solid rgba(255,45,85,0.3); color:var(--neon-pink); }

        @media (max-width:500px) {
            .stat-pill { padding:10px 12px; }
            .stat-pill .num { font-size:1.4rem; }
            .scanner-section, .recent-section { padding:12px 3%; }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <h2><i class="fas fa-qrcode" style="color:var(--neon-green);margin-right:8px;"></i>Scanner Access</h2>
        <p>Enter admin password to start QR check-in</p>
        <div class="login-error" id="loginError">Invalid password. Try again.</div>
        <input type="password" id="loginPassword" placeholder="Enter admin password" autofocus>
        <button class="btn-primary" onclick="handleLogin()">
            <i class="fas fa-lock-open"></i> authenticate()
        </button>
    </div>
</div>

<!-- MAIN SCANNER DASHBOARD -->
<div id="dashboard" style="display:none;">
    <header class="scanner-header">
        <div class="scanner-logo">QR_SCANNER</div>
        <div class="header-actions">
            <a href="/admin.html" class="header-btn"><i class="fas fa-columns"></i> Admin</a>
            <button class="header-btn logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <!-- STATS -->
    <div class="stats-bar">
        <div class="stat-pill stat-attended">
            <span class="num" id="statAttended">0</span>
            <span class="label">Checked In</span>
        </div>
        <div class="stat-pill stat-approved">
            <span class="num" id="statApproved">0</span>
            <span class="label">Approved</span>
        </div>
        <div class="stat-pill stat-remaining">
            <span class="num" id="statRemaining">0</span>
            <span class="label">Remaining</span>
        </div>
    </div>

    <!-- SCANNER -->
    <div class="scanner-section">
        <div class="scanner-card">
            <div class="scanner-title">
                <h2><i class="fas fa-camera" style="color:var(--neon-cyan);margin-right:6px;"></i>Scan QR Code</h2>
                <p>Point camera at attendee's QR code</p>
            </div>
            <div id="qr-reader"></div>
        </div>
    </div>

    <!-- RECENT CHECK-INS -->
    <div class="recent-section">
        <h3><i class="fas fa-clock" style="margin-right:6px;"></i>Recent Check-ins</h3>
        <ul class="recent-list" id="recentList">
            <li class="empty-recent"><i class="fas fa-qrcode" style="opacity:0.3;font-size:1.5rem;display:block;margin-bottom:8px;"></i>No check-ins yet. Start scanning!</li>
        </ul>
    </div>
</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="resultOverlay">
    <div class="result-card" id="resultCard">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-name" id="resultName"></div>
        <div class="result-role" id="resultRole"></div>
        <div class="result-msg" id="resultMsg"></div>
        <button class="result-dismiss" onclick="dismissResult()">Scan Next →</button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    let adminPassword = '';
    let html5QrcodeScanner = null;
    let isProcessing = false;
    let recentCheckins = [];

    // --- LOGIN ---
    document.getElementById('loginPassword').addEventListener('keypress', e => { if(e.key==='Enter') handleLogin(); });

    async function handleLogin() {
        const pw = document.getElementById('loginPassword').value;
        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pw })
            });
            if (res.ok) {
                adminPassword = pw;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                startScanner();
                fetchAttendanceStats();
            } else {
                const err = document.getElementById('loginError');
                err.style.display = 'block';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
            }
        } catch (e) {
            showToast('Cannot connect to server.', 'error');
        }
    }

    function handleLogout() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(() => {});
        }
        adminPassword = '';
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    // --- QR SCANNER ---
    function startScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", {
            fps: 10,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0,
            showTorchButtonIfSupported: true,
            showZoomSliderIfSupported: true,
            defaultZoomValueIfSupported: 2,
            rememberLastUsedCamera: true,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
        }, false);

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        // Vibrate on scan (mobile)
        if (navigator.vibrate) navigator.vibrate(100);

        try {
            const res = await fetch(`/api/admin/checkin/${encodeURIComponent(decodedText)}`, {
                method: 'POST',
                headers: { 'X-Admin-Password': adminPassword }
            });
            const data = await res.json();

            if (res.ok && data.success) {
                showResult('success', data.name, data.role, data.message);
                addRecentCheckin(data.name, data.role);
                playSuccessSound();
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else if (data.duplicate) {
                showResult('duplicate', data.name, data.role, `⚠️ Already checked in at ${formatTime(data.attended_at)}`);
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            } else {
                showResult('error', 'Invalid', 'UNKNOWN', data.error || 'QR code not recognized');
                if (navigator.vibrate) navigator.vibrate(500);
            }

            fetchAttendanceStats();
        } catch (err) {
            showResult('error', 'Error', 'NETWORK', 'Could not connect to server');
        }
    }

    function onScanFailure(error) {
        // Ignore scan failures (happens continuously while looking for QR)
    }

    // --- RESULT DISPLAY ---
    function showResult(type, name, role, msg) {
        const overlay = document.getElementById('resultOverlay');
        const card = document.getElementById('resultCard');
        const icons = { success: '✅', duplicate: '⚠️', error: '❌' };

        card.className = 'result-card ' + type;
        document.getElementById('resultIcon').textContent = icons[type] || '❓';
        document.getElementById('resultName').textContent = name;
        document.getElementById('resultRole').textContent = role;
        document.getElementById('resultMsg').textContent = msg;

        overlay.classList.add('show');
    }

    function dismissResult() {
        document.getElementById('resultOverlay').classList.remove('show');
        isProcessing = false;
    }

    // Auto-dismiss after 4 seconds
    document.getElementById('resultOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('resultOverlay')) dismissResult();
    });

    // --- ATTENDANCE STATS ---
    async function fetchAttendanceStats() {
        try {
            const res = await fetch('/api/admin/attendance', {
                headers: { 'X-Admin-Password': adminPassword }
            });
            if (!res.ok) return;
            const data = await res.json();

            document.getElementById('statAttended').textContent = data.stats.totalAttended;
            document.getElementById('statApproved').textContent = data.stats.totalApproved;
            document.getElementById('statRemaining').textContent = data.stats.remaining;
        } catch (e) { /* ignore */ }
    }

    // --- RECENT CHECK-INS ---
    function addRecentCheckin(name, role) {
        const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        recentCheckins.unshift({ name, role, time: now });
        if (recentCheckins.length > 20) recentCheckins.pop();
        renderRecentList();
    }

    function renderRecentList() {
        const list = document.getElementById('recentList');
        if (!recentCheckins.length) {
            list.innerHTML = '<li class="empty-recent"><i class="fas fa-qrcode" style="opacity:0.3;font-size:1.5rem;display:block;margin-bottom:8px;"></i>No check-ins yet. Start scanning!</li>';
            return;
        }
        list.innerHTML = recentCheckins.map(c => `
            <li class="recent-item">
                <div>
                    <div class="ri-name">${esc(c.name)}</div>
                    <span class="ri-role">${esc(c.role)}</span>
                </div>
                <span class="ri-time">${c.time}</span>
            </li>
        `).join('');
    }

    // --- HELPERS ---
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function formatTime(d) { if (!d) return '—'; return new Date(d + 'Z').toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }); }
    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast toast-' + type;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    // Simple success beep using Web Audio API
    function playSuccessSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.3);
        } catch(e) { /* ignore */ }
    }

    // Refresh stats every 15 seconds
    setInterval(() => { if (adminPassword) fetchAttendanceStats(); }, 15000);
</script>
</body>
</html>
